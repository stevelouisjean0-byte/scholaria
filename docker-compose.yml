version: "3.9"

services:
  web:
    build: .
    env_file: .env.local
    ports: ["3000:3000"]
    depends_on: [postgres, redis]
    restart: unless-stopped

  worker:
    build: .
    command: ["npm", "run", "worker"]
    env_file: .env.local
    depends_on: [postgres, redis]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scholaria
      POSTGRES_PASSWORD: scholaria
      POSTGRES_DB: scholaria
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data

volumes:
  pg-data:
  redis-data:
